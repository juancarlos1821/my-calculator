<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="calculadora">
        <h1 id="titulo">CALCULADORA ADS</h1>
        <input type="text" id="display" disabled>
        <div id="botones">
            <!-- 1 fila  -->
            <button class="operador" id="limpiar">AC</button>
            <button class="operador" id="borrar">X</button>
            <button class="operador">%</button>
            <button class="operador">/</button>
            <!-- 2 fila  -->
            <button class="numero">7</button>
            <button class="numero">8</button>
            <button class="numero">9</button>
            <button class="operador">*</button>
            <!-- 3 fila  -->
            <button class="numero">4</button>
            <button class="numero">5</button>
            <button class="numero">6</button>
            <button class="operador">-</button>
            <!-- 4 fila  -->
            <button class="numero">1</button>
            <button class="numero">2</button>
            <button class="numero">3</button>
            <button class="operador">+</button>
            <!-- 5 fila  -->
            <button class="numero">0</button>
            <button class="decimal">.</button>
            <button class="igual" id="igual">=</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
